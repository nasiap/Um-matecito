<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Un Matecito</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;700;800&family=Epilogue:wght@500;700&family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Material Symbols - Optimized Loading -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#74a540",
                        "primary-dark": "#5e8633",
                        "primary-vibrant": "#8cee2b",
                        "referral-orange": "#f46a25",
                        "trust-primary": "#396060",
                        "trust-primary-dark": "#2a4646",
                        "background-light": "#fdf8ed", 
                        "background-dark": "#191d15",
                        "mate-brown": "#8c735a",
                        "mate-brown-light": "#E8DDD4",
                        "mate-cream": "#FDF7EC",
                        "surface": "#ffffff",
                        "surface-dark": "#23281d",
                        "text-main": "#141613",
                        "text-secondary": "#76806b",
                        "mp-blue": "#009EE3",
                        "accent-blue": "#8CA8BA",
                        "accent-brown": "#8C7B6C",
                        "mate-beige": "#f4f2ef",
                        "gold": "#C3A144",
                        "ticket-bg": "#f6f7f8",
                        "danger": "#ef4444",
                        "warning": "#f59e0b",
                        "success": "#10b981",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                        "trust": ["Manrope", "sans-serif"],
                        "heading": ["Epilogue", "serif"],
                        "referral": ["Be Vietnam Pro", "sans-serif"],
                        "vibrant": ["Spline Sans", "sans-serif"],
                        "manrope": ["Manrope", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(116, 165, 64, 0.15)",
                        "card": "0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)",
                        "warm": "0 8px 24px -6px rgba(181, 149, 124, 0.15)",
                        "warm-hover": "0 12px 32px -8px rgba(181, 149, 124, 0.25)",
                        "float": "0 20px 40px -10px rgba(116, 165, 64, 0.3)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100vh;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .material-symbols-outlined {
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .organic-shape {
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .ticket-scallop {
            position: absolute;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background-color: #fdf8ed;
            z-index: 10;
        }
        .dark .ticket-scallop { background-color: #191d15; }
        
        .dashed-line {
            background-image: linear-gradient(to bottom, transparent 50%, #e5e7eb 50%);
            background-size: 2px 8px;
            background-repeat: repeat-y;
        }
    </style>
<script type="importmap">
{

  }
}
</script>
